<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Travellers Reviews · Kairali Trails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#0496a5;--teal-d:#037885;--green:#24fbaa;--dark:#052a30;--ink:#0e2e34;--muted:#5a9aa5;--line:#d7eef1;--sh:0 8px 30px rgba(4,150,165,.14);--gold:#ffb02e}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:#eef7f8;color:var(--ink)}
a{color:inherit}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(4,150,165,.06)}
.nav .brand{font-family:'Poppins';font-weight:800;color:var(--teal);letter-spacing:.5px;text-decoration:none;font-size:18px}
.nav .brand small{display:block;font-size:9px;letter-spacing:3px;color:var(--muted);font-weight:600}
.nav .back{font-size:13px;font-weight:600;color:var(--teal-d);text-decoration:none;border:1px solid var(--line);padding:8px 14px;border-radius:20px}
.wrap{max-width:960px;margin:0 auto;padding:0 16px}
.hero{padding:28px 0 6px;text-align:center}
.hero .eyebrow{color:var(--teal);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.hero h1{margin:6px 0 0;font-size:26px;color:var(--ink)}
/* summary */
.sum{display:flex;gap:16px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;margin:18px 0;box-shadow:var(--sh)}
.sum .big{background:#fff7ee;border:1px solid #ffe6c2;border-radius:14px;padding:14px 18px;text-align:center;flex:0 0 auto}
.sum .big b{font-size:30px}.sum .big .s{color:var(--gold);font-size:18px}
.sum .big small{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.bars{flex:1;display:flex;flex-direction:column;gap:6px}
.bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.bar .track{flex:1;height:8px;background:#eef3f4;border-radius:5px;overflow:hidden}
.bar .fill{height:100%;background:var(--green);border-radius:5px}
.write{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:26px;text-decoration:none;box-shadow:0 8px 20px rgba(4,150,165,.3)}
.sec-h{display:flex;align-items:center;gap:8px;margin:26px 0 12px}
.sec-h h2{margin:0;font-size:19px}.sec-h .ic{font-size:20px}
/* video marquee */
.mq-wrap{overflow:hidden;margin:0 -16px;padding:4px 0}
.mq{display:flex;gap:12px;width:max-content;animation:mq 34s linear infinite}
.mq:hover{animation-play-state:paused}
@keyframes mq{to{transform:translateX(-50%)}}
.vc{position:relative;width:150px;aspect-ratio:9/16;border-radius:16px;overflow:hidden;flex:0 0 auto;color:#fff;cursor:pointer;box-shadow:var(--sh)}
.vc .poster{position:absolute;inset:0;background-size:cover;background-position:center}
.vc:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 45%,rgba(0,0,0,.6))}
.vc .play{position:absolute;inset:0;margin:auto;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-size:15px;z-index:2}
.vc .m{position:absolute;left:10px;right:10px;bottom:10px;z-index:2}
.vc .vn{font-size:12px;font-weight:700}.vc .vp{font-size:10px;opacity:.9;background:rgba(255,255,255,.2);padding:1px 7px;border-radius:12px;display:inline-block;margin-top:3px}
/* reviews: photo-strip layout */
.reviews{display:flex;flex-direction:column;gap:14px;margin-bottom:40px}
.rev{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--sh);opacity:0;transform:translateY(16px);animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards}
.rev .who{display:flex;align-items:center;gap:11px}
.rev .av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex:0 0 auto}
.rev .nm{font-weight:700;font-size:14px}.rev .st{color:var(--gold);font-size:13px;letter-spacing:1px}
.rev .date{font-size:11px;color:var(--muted)}
.rev p{margin:10px 0 12px;font-size:13.5px;color:#40606a;line-height:1.55}
.rev .strip{display:flex;gap:8px;flex-wrap:wrap}
.rev .strip img{width:74px;height:74px;object-fit:cover;border-radius:10px;cursor:pointer;transition:transform .2s}
.rev .strip img:hover{transform:scale(1.05)}
@keyframes rise{to{opacity:1;transform:none}}
.empty{text-align:center;color:var(--muted);padding:30px;font-size:14px}
/* modal */
.modal{position:fixed;inset:0;background:rgba(3,20,24,.92);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal.on{display:flex}
.modal .x{position:absolute;top:16px;right:18px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none}
.modal video,.modal iframe{max-width:min(92vw,420px);max-height:84vh;border-radius:16px;border:none;background:#000;aspect-ratio:9/16;width:100%}
.modal img{max-width:92vw;max-height:86vh;border-radius:12px}
.footer{background:var(--dark);color:#cfeef2;text-align:center;padding:26px 16px;font-size:12px}
.demo-tag{display:none;text-align:center;font-size:11px;color:var(--muted);margin:8px 0 0}
</style>
</head>
<body>
<nav class="nav">
  <a class="brand" href="../index.html">Kairali<small>TRAILS</small></a>
  <a class="back" href="../index.html">← All packages</a>
</nav>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow">Loved by travellers</div>
    <h1>Travellers Reviews &amp; Ratings</h1>
  </div>

  <div class="sum" id="summary"></div>
  <div style="text-align:center;margin:-4px 0 8px"><a class="write" href="../review-submit/index.html">✍️ Write a review</a></div>
  <p class="demo-tag" id="demoTag">Showing sample reviews — connect Supabase to go live (see SUPABASE-SETUP.md)</p>

  <div class="sec-h"><span class="ic">🎥</span><h2>Love from our travellers</h2></div>
  <div class="mq-wrap"><div class="mq" id="videoMq"></div></div>

  <div class="sec-h"><span class="ic">💬</span><h2>What they said</h2></div>
  <div class="reviews" id="reviews"></div>
</div>

<div class="footer">Kairali Trails · Thailand · Thank you for travelling with us</div>

<div class="modal" id="modal"><button class="x" id="modalX">×</button><div id="modalBody"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — paste your Supabase anon (public) key to go live.
   Until then, the page shows the SEED sample data below.
   ============================================================ */
const SUPABASE_URL = 'https://btulhnrguotqjkhyeazk.supabase.co';
const SUPABASE_ANON_KEY = ''; // <-- paste anon public key here

/* Owner-managed video testimonials.
   type:'mp4'  -> src is a Supabase/public MP4 URL (plays with sound)
   type:'youtube' -> src is the YouTube video ID (unlisted is fine)
   poster: optional image URL; falls back to a colour if omitted. */
const VIDEOS = [
  {type:'youtube', src:'dQw4w9WgXcQ', name:'Barath\u2019s Family', place:'Phuket', poster:''},
  {type:'youtube', src:'dQw4w9WgXcQ', name:'Prajakta S',        place:'Bangkok', poster:''},
  {type:'youtube', src:'dQw4w9WgXcQ', name:'Nakul & Subree',    place:'Pattaya', poster:''},
  {type:'youtube', src:'dQw4w9WgXcQ', name:'Rashmi Rajan',      place:'Phi Phi', poster:''}
];

/* SEED reviews (shown until Supabase is connected). */
const SEED = [
  {name:'Janani Jaaz', rating:5, place:'Phuket', created_at:'2026-07-01', text:'An unforgettable family vacation — every transfer on time and the team was amazing throughout!', photos:[]},
  {name:'Rashmi Rajan', rating:5, place:'Bangkok', created_at:'2026-06-29', text:'Our very first international trip. Kairali made it memorable and completely stress-free.', photos:[]},
  {name:'Bharath K', rating:5, place:'Phi Phi', created_at:'2026-06-22', text:'Phuket with kids was seamless. The Phi Phi speedboat day was the highlight of our year.', photos:[]}
];

const POST = ['linear-gradient(160deg,#ff8a3d,#c0456b)','linear-gradient(160deg,#0aa1b0,#053a44)','linear-gradient(160deg,#2bb673,#0a6b52)','linear-gradient(160deg,#6a5cff,#2a2f7a)'];
const AVC  = ['#0496a5','#3aa76d','#f3792a','#8a5cf6','#e0567a'];
const esc = s => (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const stars = n => '★'.repeat(n)+'<span style="color:#dfe7e9">'+'★'.repeat(5-n)+'</span>';

/* ---------- video marquee ---------- */
function renderVideos(){
  const mq=document.getElementById('videoMq');
  const cards = VIDEOS.concat(VIDEOS); // duplicate for seamless loop
  mq.innerHTML = cards.map((v,i)=>{
    const bg = v.poster ? `background-image:url('${v.poster}')` : `background-image:${POST[i%POST.length]}`;
    return `<div class="vc" data-i="${i%VIDEOS.length}"><div class="poster" style="${bg}"></div><div class="play">▶</div><div class="m"><div class="vn">${esc(v.name)}</div><div class="vp">📍 ${esc(v.place)}</div></div></div>`;
  }).join('');
  mq.querySelectorAll('.vc').forEach(c=>c.onclick=()=>openVideo(VIDEOS[+c.dataset.i]));
}
function openVideo(v){
  const body=document.getElementById('modalBody');
  body.innerHTML = v.type==='youtube'
    ? `<iframe src="https://www.youtube.com/embed/${v.src}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
    : `<video src="${v.src}" controls autoplay playsinline></video>`;
  document.getElementById('modal').classList.add('on');
}

/* ---------- reviews + summary ---------- */
function renderSummary(list){
  const n=list.length, avg=n?(list.reduce((a,r)=>a+r.rating,0)/n):0;
  const dist=[5,4,3,2,1].map(s=>n?Math.round(list.filter(r=>r.rating===s).length/n*100):0);
  document.getElementById('summary').innerHTML =
    `<div class="big"><b>${avg.toFixed(1)}</b> <span class="s">★</span><small>${n} review${n===1?'':'s'}</small></div>
     <div class="bars">${[5,4,3,2,1].map((s,k)=>`<div class="bar"><span>${s} ★</span><div class="track"><div class="fill" style="width:${dist[k]}%"></div></div></div>`).join('')}</div>`;
}
function renderReviews(list){
  const box=document.getElementById('reviews');
  if(!list.length){box.innerHTML='<div class="empty">No reviews yet — be the first to share your trip!</div>';return;}
  box.innerHTML = list.map((r,idx)=>{
    const strip = (r.photos&&r.photos.length)
      ? `<div class="strip">${r.photos.map(u=>`<img src="${u}" data-full="${u}" alt="traveller photo">`).join('')}</div>` : '';
    return `<div class="rev" style="animation-delay:${Math.min(idx*0.08,0.6)}s">
      <div class="who"><div class="av" style="background:${AVC[idx%AVC.length]}">${esc((r.name||'?')[0].toUpperCase())}</div>
        <div><div class="nm">${esc(r.name)}</div><div class="st">${stars(r.rating)}</div>
        <div class="date">📍 ${esc(r.place||'')} · ${esc((r.created_at||'').slice(0,10))}</div></div></div>
      <p>${esc(r.text)}</p>${strip}</div>`;
  }).join('');
  box.querySelectorAll('.strip img').forEach(im=>im.onclick=()=>{
    document.getElementById('modalBody').innerHTML=`<img src="${im.dataset.full}">`;
    document.getElementById('modal').classList.add('on');
  });
}

/* ---------- load ---------- */
async function load(){
  renderVideos();
  let list = SEED, live=false;
  if(SUPABASE_ANON_KEY){
    try{
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const {data,error} = await sb.from('reviews').select('*').eq('approved',true).order('created_at',{ascending:false});
      if(error) throw error;
      if(data){ list = data; live=true; }
    }catch(e){ console.warn('Supabase not reachable, showing seed:', e.message); }
  }
  if(!live) document.getElementById('demoTag').style.display='block';
  renderSummary(list); renderReviews(list);
}
document.getElementById('modalX').onclick=()=>{document.getElementById('modal').classList.remove('on');document.getElementById('modalBody').innerHTML='';};
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal'){document.getElementById('modalX').onclick();}};
load();
</script>
</body>
</html>
