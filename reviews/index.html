<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Travellers Reviews · Kairali Trails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--teal:#0496a5;--teal-d:#037885;--green:#24fbaa;--dark:#052a30;--ink:#0e2e34;--muted:#5a9aa5;--line:#d7eef1;--sh:0 8px 30px rgba(4,150,165,.14);--gold:#ffb02e}
*{box-sizing:border-box}body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:#eef7f8;color:var(--ink)}
a{color:inherit}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(4,150,165,.06)}
.nav .brand{font-weight:800;color:var(--teal);letter-spacing:.5px;text-decoration:none;font-size:18px}
.nav .brand small{display:block;font-size:9px;letter-spacing:3px;color:var(--muted);font-weight:600}
.nav .back{font-size:13px;font-weight:600;color:var(--teal-d);text-decoration:none;border:1px solid var(--line);padding:8px 14px;border-radius:20px}
.wrap{max-width:960px;margin:0 auto;padding:0 16px}
.hero{padding:26px 0 6px;text-align:center}
.hero .eyebrow{color:var(--teal);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase}
.hero h1{margin:6px 0 0;font-size:26px}
.sec-h{display:flex;align-items:center;gap:8px;margin:22px 2px 12px}.sec-h .ic{font-size:20px}.sec-h h2{margin:0;font-size:19px}
.write{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;font-weight:700;font-size:14px;padding:12px 22px;border-radius:26px;text-decoration:none;box-shadow:0 8px 20px rgba(4,150,165,.3)}
.footer{background:var(--dark);color:#cfeef2;text-align:center;padding:26px 16px;font-size:12px;margin-top:34px}
.vtest{background:#f4fcfd}
.vt-mqwrap{overflow:hidden;margin-top:6px;-webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent)}
.vt-track{display:flex;gap:12px;width:max-content;will-change:transform}
.vt-c{position:relative;width:clamp(140px,40vw,168px);aspect-ratio:9/16;border-radius:16px;overflow:hidden;flex:0 0 auto;box-shadow:var(--sh);background:#0a3a42}
.vt-c video{width:100%;height:100%;object-fit:cover;display:block}
.vt-c:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 55%,rgba(0,0,0,.55));pointer-events:none}
.vt-c .m{position:absolute;left:10px;right:44px;bottom:10px;z-index:2;color:#fff;pointer-events:none}
.vt-c .vn{font-size:12px;font-weight:700}.vt-c .vp{font-size:10px;opacity:.9;background:rgba(255,255,255,.2);padding:1px 7px;border-radius:12px;display:inline-block;margin-top:3px}
.vt-c .snd{position:absolute;right:8px;bottom:8px;z-index:3;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.55);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vt-c.live .snd{background:var(--green);color:#052a30}
.rvw-sum{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--sh);margin-bottom:14px}
.rvw-sum .big{background:#fff7ee;border:1px solid #ffe6c2;border-radius:12px;padding:12px 16px;text-align:center;flex:0 0 auto}
.rvw-sum .big b{font-size:26px}.rvw-sum .big .s{color:#ffb02e}.rvw-sum .big small{display:block;font-size:11px;color:var(--muted)}
.rvw-bars{flex:1;display:flex;flex-direction:column;gap:5px}
.rvw-bar{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.rvw-bar .track{flex:1;height:7px;background:#eef3f4;border-radius:4px;overflow:hidden}.rvw-bar .fill{height:100%;background:var(--green);border-radius:4px}
.rvw-box{display:flex;flex-direction:column;gap:12px}
.rev{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--sh)}
.rev .who{display:flex;align-items:center;gap:10px}
.rev .av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex:0 0 auto}
.rev .nm{font-weight:700;font-size:13.5px}.rev .st{color:#ffb02e;font-size:12px;letter-spacing:1px}.rev .date{font-size:10.5px;color:var(--muted)}
.rev p{margin:9px 0 10px;font-size:13px;color:#40606a;line-height:1.5}
.rev .strip{display:flex;gap:7px;flex-wrap:wrap}.rev .strip img{width:70px;height:70px;object-fit:cover;border-radius:9px;cursor:pointer;transition:transform .2s}.rev .strip img:hover{transform:scale(1.05)}
.rvw-actions{display:flex;gap:10px;justify-content:center;align-items:center;margin-top:16px;flex-wrap:wrap}
.rvw-write{background:var(--teal);color:#fff;font-weight:700;font-size:13px;padding:11px 20px;border-radius:22px;text-decoration:none;box-shadow:0 6px 16px rgba(4,150,165,.28)}
.rvw-all{color:var(--teal-d);font-weight:600;font-size:13px;padding:11px 8px;text-decoration:none}
.kt-modal{position:fixed;inset:0;background:rgba(3,20,24,.92);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
.kt-modal.on{display:flex}.kt-modal img{max-width:92vw;max-height:88vh;border-radius:12px}
.kt-modal .x{position:absolute;top:14px;right:16px;color:#fff;font-size:30px;background:none;border:none;cursor:pointer}
.rtilt{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);mask-image:linear-gradient(90deg,transparent,#000 5%,#000 95%,transparent);perspective:1100px;padding:8px 0;cursor:grab;touch-action:pan-y}.rtilt.drag{cursor:grabbing}.rtilt-plane{transform:rotateX(13deg);transform-style:preserve-3d}.rtilt-track{display:flex;gap:14px;width:max-content;will-change:transform;user-select:none;padding:6px 4px}.rtilt-track .rev{width:270px;flex:0 0 auto}@media(max-width:600px){.rtilt-plane{transform:rotateX(8deg)}.rtilt-track .rev{width:238px}}.vt-c .snd{left:8px;right:auto;top:8px;bottom:auto}.vt-c .m{right:10px}.vt-c .vview{position:absolute;right:8px;top:8px;z-index:4;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}.vt-mqwrap{cursor:grab;touch-action:pan-y}.vt-mqwrap.drag{cursor:grabbing}.kt-modal video{max-width:min(94vw,420px);max-height:86vh;width:100%;aspect-ratio:9/16;border-radius:16px;background:#000}
</style></head>
<body>
<nav class="nav">
  <a class="brand" href="../index.html">Kairali<small>TRAILS</small></a>
  <a class="back" href="../index.html">← All packages</a>
</nav>
<div class="wrap">
  <div class="hero"><div class="eyebrow">Loved by travellers</div><h1>Travellers Reviews &amp; Ratings</h1></div>
  <div class="rvw-sum" id="rvwSummary" style="margin-top:16px"></div>
  <div style="text-align:center;margin:2px 0 6px"><a class="write" href="../review-submit/index.html">✍️ Write a review</a></div>

  <div class="sec-h"><span class="ic">🎥</span><h2>Love from our travellers</h2></div>
  <div class="vt-mqwrap"><div class="vt-track" id="vtestTrack"></div></div>

  <div class="sec-h"><span class="ic">💬</span><h2>What travellers say</h2></div>
  <div class="rtilt"><div class="rtilt-plane"><div class="rtilt-track" id="rvwTrack"></div></div></div>
</div>
<div class="footer">Kairali Trails · Thailand · Thank you for travelling with us</div>
<script>window.KT_BASE='../';</script>
<script src="../assets/kt-config.js"></script>
<script>(function () {
  var BASE = window.KT_BASE || '';
  var SB_URL = 'https://btulhnrguotqjkhyeazk.supabase.co';
  var SB_KEY = window.KT_SB_KEY || '';

  var SAMPLE = [BASE + 'assets/sample-1.mp4', BASE + 'assets/sample-2.mp4', BASE + 'assets/sample-3.mp4'];
  var SEED_VIDEOS = [
    { src: SAMPLE[0], name: 'Barath \u2019s Family', place: 'Phuket' },
    { src: SAMPLE[1], name: 'Achu & Liya', place: 'Krabi' },
    { src: SAMPLE[2], name: 'Nakul & Subree', place: 'Pattaya' }
  ];
  var SEED_REVIEWS = [
    { name: 'Janani Jaaz', rating: 5, place: 'Phuket', created_at: '2026-07-01', text: 'An unforgettable family vacation \u2014 every transfer on time and the team was amazing throughout!', photos: [] },
    { name: 'Rashmi Rajan', rating: 5, place: 'Bangkok', created_at: '2026-06-29', text: 'Our very first international trip. Kairali made it memorable and completely stress-free.', photos: [] },
    { name: 'Bharath K', rating: 5, place: 'Phi Phi', created_at: '2026-06-22', text: 'Phuket with kids was seamless. The Phi Phi speedboat day was the highlight of our year.', photos: [] },
    { name: 'Achu & Liya', rating: 5, place: 'Krabi', created_at: '2026-06-15', text: 'Dreamy honeymoon! The sunset cruise and the little surprises made it perfect.', photos: [] }
  ];
  var AVC = ['#0496a5', '#3aa76d', '#f3792a', '#8a5cf6', '#e0567a'];

  function esc(s) { return (s || '').replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function stars(n) { return '\u2605'.repeat(n) + '<span style="color:#dfe7e9">' + '\u2605'.repeat(5 - n) + '</span>'; }

  var modal;
  function ensureModal() {
    if (modal) return;
    modal = document.createElement('div'); modal.className = 'kt-modal';
    modal.innerHTML = '<button class="x">\u00d7</button><div class="bd"></div>';
    document.body.appendChild(modal);
    modal.querySelector('.x').onclick = function () { modal.classList.remove('on'); modal.querySelector('.bd').innerHTML = ''; if (window.__ktInlineResume) window.__ktInlineResume(); };
    modal.onclick = function (e) { if (e.target === modal) modal.querySelector('.x').onclick(); };
  }
  function showImg(u) { ensureModal(); modal.querySelector('.bd').innerHTML = '<img src="' + u + '">'; modal.classList.add('on'); }
  function showVideo(src) { ensureModal(); if (window.__ktInlinePause) window.__ktInlinePause(); modal.querySelector('.bd').innerHTML = '<video src="' + src + '" controls autoplay playsinline></video>'; modal.classList.add('on'); }

  /* ---------------- VIDEO ROW: auto-drift + drag + tap-to-toggle-sound + view ---------------- */
  function renderVideos(vids) {
    var track = document.getElementById('vtestTrack'); if (!track || !vids.length) return;
    var set = vids.concat(vids);
    track.innerHTML = set.map(function (v, i) {
      var idx = i % vids.length;
      return '<div class="vt-c" data-i="' + idx + '"><video src="' + v.src + '" muted loop playsinline preload="metadata"></video>' +
        '<div class="snd">\uD83D\uDD07</div>' +
        '<button class="vview" aria-label="view">\u26F6</button>' +
        '<div class="m"><div class="vn">' + esc(v.name) + '</div></div></div>';
    }).join('');
    var row = track.parentNode;
    var cards = [].slice.call(track.querySelectorAll('.vt-c'));
    var vels = cards.map(function (c) { return c.querySelector('video'); });
    var x = 0, half = 0, drag = false, moved = false, sx = 0, sy = 0, soff = 0, axis = 0, soundOn = false, onScreen = false, bufferUntil = 0;
    function measure() { half = track.scrollWidth / 2; }
    setTimeout(measure, 400); window.addEventListener('resize', measure);
    function playVisible() { if (!onScreen) return; vels.forEach(function (v) { if (v._vis) { var p = v.play(); if (p && p.catch) p.catch(function () {}); } }); }
    function pauseAll() { vels.forEach(function (v) { v.pause(); }); }
    vels.forEach(function (v) {
      v._vis = false;
      v.addEventListener('waiting', function () { bufferUntil = performance.now() + 500; });
      v.addEventListener('stalled', function () { bufferUntil = performance.now() + 500; });
    });
    var vio = new IntersectionObserver(function (es) {
      es.forEach(function (e) {
        var v = e.target; v._vis = e.isIntersecting;
        if (e.isIntersecting) { if (onScreen) { var p = v.play(); if (p && p.catch) p.catch(function () {}); } }
        else if (v.muted) { v.pause(); }
      });
    }, { root: row, rootMargin: '0px 150px', threshold: 0 });
    vels.forEach(function (v) { vio.observe(v); });
    function tap(card) {
      var v = card.querySelector('video');
      if (v.muted) {
        cards.forEach(function (cc) { cc.querySelector('video').muted = true; cc.classList.remove('live'); cc.querySelector('.snd').textContent = '\uD83D\uDD07'; });
        v.muted = false; v.play(); card.classList.add('live'); card.querySelector('.snd').textContent = '\uD83D\uDD0A'; soundOn = true;
      } else { v.muted = true; card.classList.remove('live'); card.querySelector('.snd').textContent = '\uD83D\uDD07'; soundOn = false; }
    }
    cards.forEach(function (card) { card.querySelector('.vview').addEventListener('click', function (e) { e.stopPropagation(); showVideo(card.querySelector('video').src); }); });
    row.addEventListener('pointerdown', function (e) { drag = true; moved = false; axis = 0; sx = e.clientX; sy = e.clientY; soff = x; });
    window.addEventListener('pointermove', function (e) {
      if (!drag) return;
      var dx = e.clientX - sx, dy = e.clientY - sy;
      if (axis === 0) { // decide gesture direction once
        if (Math.abs(dx) > 7 || Math.abs(dy) > 7) { axis = Math.abs(dx) > Math.abs(dy) ? 1 : -1; if (axis === -1) { drag = false; return; } row.classList.add('drag'); } else return;
      }
      moved = true; if (e.cancelable) e.preventDefault(); x = soff + dx; apply();
    }, { passive: false });
    window.addEventListener('pointerup', function (e) {
      if (!drag) return; drag = false; row.classList.remove('drag');
      if (!moved) { var c = e.target.closest('.vt-c'); if (c && !e.target.closest('.vview')) tap(c); }
    });
    function apply() { if (half) { if (x <= -half) x += half; if (x > 0) x -= half; } track.style.transform = 'translateX(' + x + 'px)'; }
    function tick() { if (onScreen && !drag && !soundOn && half && performance.now() > bufferUntil) { x -= 0.35; apply(); } requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
    new IntersectionObserver(function (es) { es.forEach(function (e) { onScreen = e.isIntersecting; if (onScreen) playVisible(); else pauseAll(); }); }, { threshold: 0.2 }).observe(row);
    window.__ktInlinePause = function () { vels.forEach(function (v) { v.pause(); v.muted = true; }); cards.forEach(function (c) { c.classList.remove('live'); var s = c.querySelector('.snd'); if (s) s.textContent = '\uD83D\uDD07'; }); soundOn = false; };
    window.__ktInlineResume = function () { playVisible(); };
  }

  /* ---------------- REVIEWS: tilted marquee plane ---------------- */
  function renderSummary(list) {
    var el = document.getElementById('rvwSummary'); if (!el) return;
    var n = list.length, avg = n ? list.reduce(function (a, r) { return a + r.rating; }, 0) / n : 0;
    var dist = [5, 4, 3, 2, 1].map(function (s) { return n ? Math.round(list.filter(function (r) { return r.rating === s; }).length / n * 100) : 0; });
    el.innerHTML = '<div class="big"><b>' + avg.toFixed(1) + '</b> <span class="s">\u2605</span><small>' + n + ' review' + (n === 1 ? '' : 's') + '</small></div>' +
      '<div class="rvw-bars">' + [5, 4, 3, 2, 1].map(function (s, k) { return '<div class="rvw-bar"><span>' + s + ' \u2605</span><div class="track"><div class="fill" style="width:' + dist[k] + '%"></div></div></div>'; }).join('') + '</div>';
  }
  function reviewCard(r, i) {
    var strip = (r.photos && r.photos.length) ? '<div class="strip">' + r.photos.map(function (u) { return '<img src="' + u + '" data-full="' + u + '" alt="traveller photo">'; }).join('') + '</div>' : '';
    return '<div class="rev"><div class="who"><div class="av" style="background:' + AVC[i % AVC.length] + '">' + esc((r.name || '?')[0].toUpperCase()) + '</div>' +
      '<div><div class="nm">' + esc(r.name) + '</div><div class="st">' + stars(r.rating) + '</div>' +
      '<div class="date">\uD83D\uDCCD ' + esc(r.place || '') + '</div></div></div><p>' + esc(r.text) + '</p>' + strip + '</div>';
  }
  function renderReviews(list) {
    var track = document.getElementById('rvwTrack'); if (!track) return;
    var wrap = track.closest('.rtilt');
    if (!list.length) { if (wrap) wrap.innerHTML = '<div style="text-align:center;color:#5a9aa5;padding:24px">No reviews yet \u2014 be the first to share your trip!</div>'; return; }
    var cards = list.concat(list); // duplicate for seamless loop
    track.innerHTML = cards.map(reviewCard).join('');
    track.querySelectorAll('.strip img').forEach(function (im) { im.onclick = function (e) { e.stopPropagation(); showImg(im.dataset.full); }; });
    var x = 0, half = 0, drag = false, sx = 0, sy = 0, soff = 0, axis = 0, onScreen = false;
    function measure() { half = track.scrollWidth / 2; }
    setTimeout(measure, 400); window.addEventListener('resize', measure);
    wrap.addEventListener('pointerdown', function (e) { drag = true; axis = 0; sx = e.clientX; sy = e.clientY; soff = x; });
    window.addEventListener('pointermove', function (e) {
      if (!drag) return;
      var dx = e.clientX - sx, dy = e.clientY - sy;
      if (axis === 0) { if (Math.abs(dx) > 7 || Math.abs(dy) > 7) { axis = Math.abs(dx) > Math.abs(dy) ? 1 : -1; if (axis === -1) { drag = false; return; } } else return; }
      if (e.cancelable) e.preventDefault(); x = soff + dx; ap();
    }, { passive: false });
    window.addEventListener('pointerup', function () { drag = false; });
    function ap() { if (half) { if (x <= -half) x += half; if (x > 0) x -= half; } track.style.transform = 'translateX(' + x + 'px)'; }
    function tick() { if (onScreen && !drag && half) { x -= 0.3; ap(); } requestAnimationFrame(tick); }
    requestAnimationFrame(tick);
    new IntersectionObserver(function (es) { es.forEach(function (e) { onScreen = e.isIntersecting; }); }, { threshold: 0.1 }).observe(wrap);
  }

  /* ---------------- LOAD ---------------- */
  function render(videos, reviews) { renderVideos(videos); renderSummary(reviews); renderReviews(reviews); }
  function sbGet(path) { return fetch(SB_URL + '/rest/v1/' + path, { headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } }).then(function (r) { return r.json(); }); }

  if (SB_KEY) {
    Promise.all([
      sbGet('testimonials?select=*&order=created_at.desc').catch(function () { return null; }),
      sbGet('reviews?approved=eq.true&order=created_at.desc&limit=20').catch(function () { return null; })
    ]).then(function (res) {
      var vids = (res[0] && res[0].length) ? res[0].map(function (t) { return { src: t.video_url, name: t.name, place: t.place }; }) : SEED_VIDEOS;
      var revs = (res[1] && res[1].length) ? res[1] : SEED_REVIEWS;
      render(vids, revs);
    });
  } else {
    render(SEED_VIDEOS, SEED_REVIEWS);
  }
})();
</script>
</body></html>
